name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Cache chroma embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma
          key: chroma-onnx-${{ runner.os }}

      - name: Install
        run: uv sync

      - name: Lint
        run: uv run ruff check src tests

      - name: Type check
        run: uv run mypy src

      - name: Workflow script syntax
        run: node scripts/check_workflow.mjs

      - name: Tests
        run: uv run pytest -v

      - name: Merge-fidelity eval (real embeddings)
        run: uv run pytest -m eval -v

      - name: Smoke test (end-to-end pipeline)
        run: uv run python scripts/smoke.py

      - name: Pipeline smoke test (survey CLI, offline embeddings)
        run: uv run python scripts/smoke_pipeline.py
